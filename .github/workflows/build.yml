name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 编译
        run: cargo build --release

      - name: 打包
        shell: pwsh
        run: |
          $name = "faster-chant-rs"
          $version = (Get-Date -Format "yyyyMMdd-HHmm")
          if ($env:GITHUB_REF -match "^refs/tags/v") {
            $version = $env:GITHUB_REF -replace "refs/tags/v", ""
          }

          New-Item -ItemType Directory -Force -Path dist

          # 1. 单文件 exe（直接下载用）
          Copy-Item target\release\faster-chant-rs.exe "dist\$name-$version.exe"

          # 2. zip 包（含 exe + 目录结构）
          $dest = "dist\$name"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item target\release\faster-chant-rs.exe $dest\
          Copy-Item README.md $dest\
          Copy-Item LICENSE $dest\
          New-Item -ItemType Directory -Force -Path "$dest\schemes"
          New-Item -ItemType Directory -Force -Path "$dest\logs"

          Compress-Archive -Path $dest\* -DestinationPath "dist\$name-$version-x64.zip"

          echo "exe=$name-$version.exe" >> $env:GITHUB_ENV
          echo "zip=$name-$version-x64.zip" >> $env:GITHUB_ENV

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: faster-chant-rs-windows
          path: |
            dist/*.exe
            dist/*.zip

      - name: 发布到 Release (仅 tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true